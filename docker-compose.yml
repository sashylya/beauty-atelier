services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: beauty-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - ./backend:/var/www/backend
    networks:
      - beauty-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: beauty-web
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - beauty-network

  # Database Service
  db:
    image: mysql:8.0
    container_name: beauty-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: beauty_atelier
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: beauty_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - beauty-network

  # Node Service for Vite
  node:
    image: node:20-alpine
    container_name: beauty-node
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
      - ./backend:/var/www/backend
    ports:
      - "5173:5173"
    environment:
      - VITE_PORT=5173
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - beauty-network

networks:
  beauty-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
